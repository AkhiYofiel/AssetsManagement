services:
  postgres:
    image: postgres:16-alpine
    container_name: assetmanagement-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: AssetManagementDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d AssetManagementDb"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: assetmanagement-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  webapi:
    build:
      context: .
      dockerfile: AssetManagement/Dockerfile
    container_name: assetmanagement-webapi
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=AssetManagementDb;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  angular:
    build:
      context: ./asset-management-ui
      dockerfile: Dockerfile
    container_name: assetmanagement-angular
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - webapi

volumes:
  postgres_data:
  pgadmin_data:
